name: Build (Android / Windows / Linux)

on:
  push:
    branches: [ main ]
    tags: [ 'test*', 'v*', '[0-9]*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore signing keystore from cache
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: android/app/familyplanner.keystore
          key: signing-keystore-v1

      - name: Generate keystore if not cached
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          keytool -genkeypair -v \
            -keystore android/app/familyplanner.keystore \
            -alias familyplannerkey \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass "$STORE_PASSWORD" -keypass "$KEY_PASSWORD" \
            -dname "CN=FamilyPlanner,O=PBrockt,C=DE" -noprompt

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=familyplannerkey
          storeFile=familyplanner.keystore
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UnserFamilienOrganizer-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      # Bei einem Tag (z.B. test002, v1.0) automatisch ein Release mit APK.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="UnserFamilienOrganizer-${{ github.ref_name }}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$APK"
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" "$APK" --clobber
          else
            gh release create "${{ github.ref_name }}" "$APK" \
              --title "Version ${{ github.ref_name }}" \
              --notes "Unser Familien-Organizer – Version ${{ github.ref_name }}."
          fi

  # Windows-Desktop (.exe, portabel als ZIP) – nur bei Tags.
  build-windows:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Flutter pub get
        run: flutter pub get
      - name: Generate app icons
        run: dart run flutter_launcher_icons
      - name: Build Windows
        # flutter_local_notifications_windows nutzt <experimental/coroutine>,
        # das der neueste MSVC als Fehler wertet (STL1011). Define schaltet das
        # auf eine erlaubte Warnung herunter (Notifications nutzen wir auf
        # Desktop ohnehin nicht).
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
        run: flutter build windows --release
      - name: Package ZIP (portabel)
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "UnserFamilienOrganizer-windows-${{ github.ref_name }}.zip"
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build Windows installer (Setup.exe)
        # SourceDir bleibt der Skript-Default (..\..\build\...), da Inno relative
        # [Files]-Pfade relativ zur .iss-Datei aufloest.
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ github.ref_name }}" `
            installer\windows\setup.iss
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "UnserFamilienOrganizer-windows-${{ github.ref_name }}.zip" --clobber
          gh release upload "${{ github.ref_name }}" "installer\windows\installer_output\UnserFamilienOrganizer-Setup-${{ github.ref_name }}.exe" --clobber

  # Linux-Desktop (Bundle als tar.gz) – nur bei Tags.
  build-linux:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libsqlite3-dev
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      - name: Flutter pub get
        run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release
      - name: Build .deb package
        run: bash installer/linux/build-deb.sh "${{ github.ref_name }}"
      - name: Add installer scripts to bundle
        run: |
          cp installer/linux/install.sh installer/linux/uninstall.sh build/linux/x64/release/bundle/
          cp design/icons/icon.png build/linux/x64/release/bundle/unser-familien-organizer.png
          chmod +x build/linux/x64/release/bundle/install.sh build/linux/x64/release/bundle/uninstall.sh
      - name: Package tar.gz (mit install.sh)
        run: tar -czf "UnserFamilienOrganizer-linux-${{ github.ref_name }}.tar.gz" -C build/linux/x64/release/bundle .
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "UnserFamilienOrganizer-linux-${{ github.ref_name }}.tar.gz" --clobber
          gh release upload "${{ github.ref_name }}" "UnserFamilienOrganizer-${{ github.ref_name }}-amd64.deb" --clobber
