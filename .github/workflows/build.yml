name: Build (Android / Windows / Linux)

on:
  push:
    branches: [ main ]
    tags: [ 'test*', 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore signing keystore from cache
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: android/app/familyplanner.keystore
          key: signing-keystore-v1

      - name: Generate keystore if not cached
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          keytool -genkeypair -v \
            -keystore android/app/familyplanner.keystore \
            -alias familyplannerkey \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass familyplanner2026 -keypass familyplanner2026 \
            -dname "CN=FamilyPlanner,O=PBrockt,C=DE" -noprompt

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=familyplanner2026
          keyPassword=familyplanner2026
          keyAlias=familyplannerkey
          storeFile=familyplanner.keystore
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FamilyPlanner-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      # Bei einem Tag (z.B. test002, v1.0) automatisch ein Release mit APK.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="FamilyPlanner-${{ github.ref_name }}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$APK"
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" "$APK" --clobber
          else
            gh release create "${{ github.ref_name }}" "$APK" \
              --title "FamilyPlanner ${{ github.ref_name }}" \
              --notes "Automatischer Build von Tag ${{ github.ref_name }}."
          fi

  # Windows-Desktop (.exe, portabel als ZIP) – nur bei Tags.
  build-windows:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Flutter pub get
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Package ZIP
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "FamilyPlanner-windows-${{ github.ref_name }}.zip"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "FamilyPlanner-windows-${{ github.ref_name }}.zip" --clobber

  # Linux-Desktop (Bundle als tar.gz) – nur bei Tags.
  build-linux:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libsqlite3-dev
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      - name: Flutter pub get
        run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release
      - name: Package tar.gz
        run: tar -czf "FamilyPlanner-linux-${{ github.ref_name }}.tar.gz" -C build/linux/x64/release/bundle .
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "FamilyPlanner-linux-${{ github.ref_name }}.tar.gz" --clobber
